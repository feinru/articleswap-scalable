services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: articleswap-rabbitmq
    hostname: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - articleswap-net

  api-gateway1:
    image: ${IMAGE_API_GATEWAY}
    pull_policy: always
    container_name: articleswap-gateway1
    hostname: api-gateway1
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_DELIVERED_EXCHANGE=article-delivered.exchange
      - RABBITMQ_CONSUMER_NAME=api-gateway1
      - CLUSTER_PEERS=api-gateway1:5173,api-gateway2:5173
      - HOSTNAME=api-gateway1
      - ARTICLE_SERVICE_URL=http://article-service:3000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - articleswap-net

  api-gateway2:
    image: ${IMAGE_API_GATEWAY}
    pull_policy: always
    container_name: articleswap-gateway2
    hostname: api-gateway2
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_DELIVERED_EXCHANGE=article-delivered.exchange
      - RABBITMQ_CONSUMER_NAME=api-gateway2
      - CLUSTER_PEERS=api-gateway1:5173,api-gateway2:5173
      - HOSTNAME=api-gateway2
      - ARTICLE_SERVICE_URL=http://article-service:3000
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - articleswap-net

  article-service:
    image: ${IMAGE_ARTICLE_SERVICE}
    pull_policy: always
    container_name: articleswap-article-service
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - RABBITMQ_QUEUE=article-submissions
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - TRUST_PROXY=1
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-30}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  nginx:
    image: ${IMAGE_NGINX}
    pull_policy: always
    container_name: articleswap-nginx
    ports:
      - "8080:8080"
    depends_on:
      - api-gateway1
      - api-gateway2
      - article-service
    networks:
      - articleswap-net
      - dokploy-network

  postgres:
    image: postgres:16-alpine
    container_name: articleswap-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - articleswap-net

  minio:
    image: minio/minio:latest
    container_name: articleswap-minio
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - articleswap-net
      - dokploy-network

  minio-init:
    image: minio/mc:latest
    container_name: articleswap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET};
      mc anonymous set download local/${MINIO_BUCKET};
      exit 0;
      "
    networks:
      - articleswap-net

  stemming-service:
    image: ${IMAGE_STEMMING_SERVICE}
    pull_policy: always
    container_name: articleswap-stemming-service
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - CONSUME_TOPIC=article-submissions
      - PRODUCE_TOPIC=article-stemmed
      - DLQ_TOPIC=article-submissions-dlq
      - PENDING_REQUEUE_THRESHOLD_MINUTES=${PENDING_REQUEUE_THRESHOLD_MINUTES:-30}
      - RABBITMQ_CONSUMER_NAME=stemming-service
      - RABBITMQ_PREFETCH=${RABBITMQ_PREFETCH:-1}
      - HEALTH_PORT=3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  wordcloud-service:
    image: ${IMAGE_WORDCLOUD_SERVICE}
    pull_policy: always
    container_name: articleswap-wordcloud-service
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - CONSUME_TOPIC=article-stemmed
      - PRODUCE_TOPIC=article-wordcloud-generated
      - RABBITMQ_CONSUMER_NAME=wordcloud-service
      - RABBITMQ_PREFETCH=${RABBITMQ_PREFETCH:-1}
      - MINIO_ENDPOINT=${MINIO_HOST}
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=false
      - PUBLIC_MINIO_URL=${PUBLIC_MINIO_URL}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - articleswap-net

  forwarding-inbox-service:
    image: ${IMAGE_FORWARDING_INBOX_SERVICE}
    pull_policy: always
    container_name: articleswap-forwarding-inbox-service
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - DATABASE_URL=${DATABASE_URL}
      - CONSUME_TOPIC=article-wordcloud-generated
      - PRODUCE_TOPIC=article-delivered
      - RABBITMQ_CONSUMER_NAME=forwarding-inbox-service
      - RABBITMQ_PREFETCH=${RABBITMQ_PREFETCH:-1}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

volumes:
  postgres-data:
  minio-data:

networks:
  articleswap-net:
    driver: bridge
  dokploy-network:
    external: true
