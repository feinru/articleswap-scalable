services:
  kafka:
    image: apache/kafka:latest
    container_name: articleswap-kafka
    hostname: kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_MESSAGE_MAX_BYTES=10485760
      - KAFKA_REPLICA_FETCH_MAX_BYTES=10485760
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s
    networks:
      - articleswap-net

  api-gateway1:
    image: ${IMAGE_API_GATEWAY}
    pull_policy: always
    container_name: articleswap-gateway1
    hostname: api-gateway1
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=article-delivered
      - KAFKA_CLIENT_ID=articles-api-gateway
      - CLUSTER_PEERS=api-gateway1:5173,api-gateway2:5173
      - HOSTNAME=api-gateway1
      - ARTICLE_SERVICE_URL=http://article-service:3000
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - articleswap-net

  api-gateway2:
    image: ${IMAGE_API_GATEWAY}
    pull_policy: always
    container_name: articleswap-gateway2
    hostname: api-gateway2
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=article-delivered
      - KAFKA_CLIENT_ID=articles-api-gateway
      - CLUSTER_PEERS=api-gateway1:5173,api-gateway2:5173
      - HOSTNAME=api-gateway2
      - ARTICLE_SERVICE_URL=http://article-service:3000
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - articleswap-net

  article-service:
    image: ${IMAGE_ARTICLE_SERVICE}
    pull_policy: always
    container_name: articleswap-article-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=article-submissions
      - KAFKA_CLIENT_ID=article-service
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - TRUST_PROXY=1
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-60000}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-30}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  nginx:
    image: ${IMAGE_NGINX}
    pull_policy: always
    container_name: articleswap-nginx
    ports:
      - "8080:8080"
    depends_on:
      - api-gateway1
      - api-gateway2
      - article-service
    networks:
      - articleswap-net
      - dokploy-network

  postgres:
    image: postgres:16-alpine
    container_name: articleswap-postgres
    hostname: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - articleswap-net

  minio:
    image: minio/minio:latest
    container_name: articleswap-minio
    hostname: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - articleswap-net
      - dokploy-network

  minio-init:
    image: minio/mc:latest
    container_name: articleswap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET};
      mc anonymous set download local/${MINIO_BUCKET};
      exit 0;
      "
    networks:
      - articleswap-net

  stemming-service:
    image: ${IMAGE_STEMMING_SERVICE}
    pull_policy: always
    container_name: articleswap-stemming-service
    restart: unless-stopped
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=${DATABASE_URL}
      - CONSUME_TOPIC=article-submissions
      - PRODUCE_TOPIC=article-stemmed
      - DLQ_TOPIC=article-submissions-dlq
      - PENDING_REQUEUE_THRESHOLD_MINUTES=${PENDING_REQUEUE_THRESHOLD_MINUTES:-30}
      - KAFKA_SESSION_TIMEOUT_MS=${KAFKA_SESSION_TIMEOUT_MS:-120000}
      - KAFKA_HEARTBEAT_INTERVAL_MS=${KAFKA_HEARTBEAT_INTERVAL_MS:-3000}
      - KAFKA_REBALANCE_TIMEOUT_MS=${KAFKA_REBALANCE_TIMEOUT_MS:-120000}
      - KAFKA_MAX_WAIT_TIME_MS=${KAFKA_MAX_WAIT_TIME_MS:-5000}
      - KAFKA_MAX_BYTES_PER_PARTITION=${KAFKA_MAX_BYTES_PER_PARTITION:-1048576}
      - KAFKA_MAX_IN_FLIGHT_REQUESTS=${KAFKA_MAX_IN_FLIGHT_REQUESTS:-1}
      - HEALTH_PORT=3001
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  wordcloud-service:
    image: ${IMAGE_WORDCLOUD_SERVICE}
    pull_policy: always
    container_name: articleswap-wordcloud-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=${DATABASE_URL}
      - CONSUME_TOPIC=article-stemmed
      - PRODUCE_TOPIC=article-wordcloud-generated
      - MINIO_ENDPOINT=${MINIO_HOST}
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=false
      - PUBLIC_MINIO_URL=${PUBLIC_MINIO_URL}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - articleswap-net

  forwarding-inbox-service:
    image: ${IMAGE_FORWARDING_INBOX_SERVICE}
    pull_policy: always
    container_name: articleswap-forwarding-inbox-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=${DATABASE_URL}
      - CONSUME_TOPIC=article-wordcloud-generated
      - PRODUCE_TOPIC=article-delivered
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: articleswap-kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=articleswap
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - articleswap-net
      - dokploy-network

volumes:
  postgres-data:
  minio-data:

networks:
  articleswap-net:
    driver: bridge
  dokploy-network:
    external: true
