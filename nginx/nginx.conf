# Nginx load balancer for the API gateway cluster.
# Container-friendly version: no local runtime paths, logs to stdout/stderr.

pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Default proxy buffers are too small for SSE long-lived streams
    proxy_buffer_size 16k;
    proxy_buffers 4 16k;

    upstream gateway_cluster {
        # Least connection: SSE connections are long-lived, so this
        # naturally spreads new short-lived POSTs across instances.
        least_conn;

        server gateway1:5173 max_fails=3 fail_timeout=10s;
        server gateway2:5173 max_fails=3 fail_timeout=10s;
    }

    upstream article_service {
        server article-service:3000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;
        server_name _;

        # Article submission + retrieval routed to dedicated article-service.
        # (api-gateway no longer handles these — split into its own service.)
        location ~ ^/api/articles(/.*)?$ {
            proxy_pass http://article-service:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://gateway_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support: disable buffering, force HTTP/1.1, long read timeout
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }
    }
}
