services:
  # Apache Kafka in KRaft mode
  kafka:
    image: apache/kafka:latest
    container_name: articleswap-kafka
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 15s
    networks:
      - articleswap-net

  gateway1:
    build:
      context: ./api-gateway
    container_name: articleswap-gateway1
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=article-submissions
      - KAFKA_CLIENT_ID=articles-api-gateway
      - CLUSTER_PEERS=gateway1:5173,gateway2:5173
      - HOSTNAME=gateway1
      - ARTICLE_SERVICE_URL=http://article-service:3000
    volumes:
      - ./api-gateway/src:/app/src:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - articleswap-net

  gateway2:
    build:
      context: ./api-gateway
    container_name: articleswap-gateway2
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=article-submissions
      - KAFKA_CLIENT_ID=articles-api-gateway
      - CLUSTER_PEERS=gateway1:5173,gateway2:5173
      - HOSTNAME=gateway2
      - ARTICLE_SERVICE_URL=http://article-service:3000
    volumes:
      - ./api-gateway/src:/app/src:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - articleswap-net

  # Article submission service (split from api-gateway).
  # Owns the POST /api/articles endpoint and Kafka producer.
  article-service:
    build:
      context: ./services/article-service
    container_name: articleswap-article-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC=article-submissions
      - KAFKA_CLIENT_ID=article-service
      - PORT=3000
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  nginx:
    image: nginx:alpine
    container_name: articleswap-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway1
      - gateway2
      - article-service
    networks:
      - articleswap-net

  postgres:
    image: postgres:16-alpine
    container_name: articleswap-postgres
    environment:
      POSTGRES_USER: articleswap
      POSTGRES_PASSWORD: articleswap
      POSTGRES_DB: articleswap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - articleswap-net

  redis:
    image: redis:7-alpine
    container_name: articleswap-redis
    ports:
      - "6379:6379"
    networks:
      - articleswap-net

  # MinIO Object Storage untuk menyimpan file word cloud
  minio:
    image: minio/minio:latest
    container_name: articleswap-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=articleswap
      - MINIO_ROOT_PASSWORD=articleswap123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - articleswap-net

  # Membuat bucket otomatis saat MinIO siap
  minio-init:
    image: minio/mc:latest
    container_name: articleswap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 articleswap articleswap123;
      mc mb -p local/wordclouds;
      mc anonymous set download local/wordclouds;
      exit 0;
      "
    networks:
      - articleswap-net

  stemming-service:
    build:
      context: ./services/stemming-service
    container_name: articleswap-stemming-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
      - REDIS_URL=redis://redis:6379
      - CONSUME_TOPIC=article-submissions
      - PRODUCE_TOPIC=article-stemmed
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - articleswap-net

  wordcloud-service:
    build:
      context: ./services/wordcloud-service
    container_name: articleswap-wordcloud-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
      - REDIS_URL=redis://redis:6379
      - CONSUME_TOPIC=article-stemmed
      - PRODUCE_TOPIC=article-wordcloud-generated

      # MinIO config
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=articleswap
      - MINIO_SECRET_KEY=articleswap123
      - MINIO_BUCKET=wordclouds
      - MINIO_USE_SSL=false
      - PUBLIC_MINIO_URL=http://localhost:9000
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - articleswap-net

  forwarding-inbox-service:
    build:
      context: ./services/forwarding-inbox-service
    container_name: articleswap-forwarding-inbox-service
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
      - CONSUME_TOPIC=article-wordcloud-generated
      - PRODUCE_TOPIC=article-delivered
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: articleswap-kafka-ui
    ports:
      - "8081:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=articleswap
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - articleswap-net

volumes:
  postgres-data:
  minio-data:

networks:
  articleswap-net:
    driver: bridge
