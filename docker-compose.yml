services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: articleswap-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=articleswap
      - RABBITMQ_DEFAULT_PASS=articleswap
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - articleswap-net

  gateway1:
    build:
      context: ./api-gateway
    container_name: articleswap-gateway1
    environment:
      - RABBITMQ_URL=amqp://articleswap:articleswap@rabbitmq:5672
      - RABBITMQ_DELIVERED_EXCHANGE=article-delivered.exchange
      - RABBITMQ_CONSUMER_NAME=gateway1
      - CLUSTER_PEERS=gateway1:5173,gateway2:5173
      - HOSTNAME=gateway1
      - ARTICLE_SERVICE_URL=http://article-service:3000
    volumes:
      - ./api-gateway/src:/app/src:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - articleswap-net

  gateway2:
    build:
      context: ./api-gateway
    container_name: articleswap-gateway2
    environment:
      - RABBITMQ_URL=amqp://articleswap:articleswap@rabbitmq:5672
      - RABBITMQ_DELIVERED_EXCHANGE=article-delivered.exchange
      - RABBITMQ_CONSUMER_NAME=gateway2
      - CLUSTER_PEERS=gateway1:5173,gateway2:5173
      - HOSTNAME=gateway2
      - ARTICLE_SERVICE_URL=http://article-service:3000
    volumes:
      - ./api-gateway/src:/app/src:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - articleswap-net

  # Article submission service (split from api-gateway).
  # Owns the POST /api/articles endpoint and RabbitMQ publisher.
  article-service:
    build:
      context: ./services/article-service
    container_name: articleswap-article-service
    environment:
      - RABBITMQ_URL=amqp://articleswap:articleswap@rabbitmq:5672
      - RABBITMQ_QUEUE=article-submissions
      - PORT=3000
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

  nginx:
    image: nginx:alpine
    container_name: articleswap-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway1
      - gateway2
      - article-service
    networks:
      - articleswap-net

  postgres:
    image: postgres:16-alpine
    container_name: articleswap-postgres
    environment:
      POSTGRES_USER: articleswap
      POSTGRES_PASSWORD: articleswap
      POSTGRES_DB: articleswap
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - articleswap-net

  redis:
    image: redis:7-alpine
    container_name: articleswap-redis
    ports:
      - "6379:6379"
    networks:
      - articleswap-net

  # MinIO Object Storage untuk menyimpan file word cloud
  minio:
    image: minio/minio:latest
    container_name: articleswap-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=articleswap
      - MINIO_ROOT_PASSWORD=articleswap123
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - articleswap-net

  # Membuat bucket otomatis saat MinIO siap
  minio-init:
    image: minio/mc:latest
    container_name: articleswap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 articleswap articleswap123;
      mc mb -p local/wordclouds;
      mc anonymous set download local/wordclouds;
      exit 0;
      "
    networks:
      - articleswap-net

  stemming-service:
    build:
      context: ./services/stemming-service
    container_name: articleswap-stemming-service
    restart: unless-stopped
    environment:
      - RABBITMQ_URL=amqp://articleswap:articleswap@rabbitmq:5672
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
      - REDIS_URL=redis://redis:6379
      - CONSUME_TOPIC=article-submissions
      - PRODUCE_TOPIC=article-stemmed
      - DLQ_TOPIC=article-submissions-dlq
      - PENDING_REQUEUE_THRESHOLD_MINUTES=30
      - RABBITMQ_CONSUMER_NAME=stemming-service
      - RABBITMQ_PREFETCH=1
      - HEALTH_PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - articleswap-net

  wordcloud-service:
    build:
      context: ./services/wordcloud-service
    container_name: articleswap-wordcloud-service
    environment:
      - RABBITMQ_URL=amqp://articleswap:articleswap@rabbitmq:5672
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
      - REDIS_URL=redis://redis:6379
      - CONSUME_TOPIC=article-stemmed
      - PRODUCE_TOPIC=article-wordcloud-generated
      - RABBITMQ_CONSUMER_NAME=wordcloud-service
      - RABBITMQ_PREFETCH=1

      # MinIO config
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=articleswap
      - MINIO_SECRET_KEY=articleswap123
      - MINIO_BUCKET=wordclouds
      - MINIO_USE_SSL=false
      - PUBLIC_MINIO_URL=http://localhost:9000
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - articleswap-net

  forwarding-inbox-service:
    build:
      context: ./services/forwarding-inbox-service
    container_name: articleswap-forwarding-inbox-service
    environment:
      - RABBITMQ_URL=amqp://articleswap:articleswap@rabbitmq:5672
      - DATABASE_URL=postgresql://articleswap:articleswap@postgres:5432/articleswap
      - CONSUME_TOPIC=article-wordcloud-generated
      - PRODUCE_TOPIC=article-delivered
      - RABBITMQ_CONSUMER_NAME=forwarding-inbox-service
      - RABBITMQ_PREFETCH=1
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_started
    networks:
      - articleswap-net

volumes:
  postgres-data:
  minio-data:

networks:
  articleswap-net:
    driver: bridge
