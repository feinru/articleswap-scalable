pid nginx_runtime/nginx.pid;
error_log nginx_runtime/nginx_error.log warn;

events {
    worker_connections 1024;
}

http {
    access_log nginx_runtime/nginx_access.log;
    client_body_temp_path nginx_runtime/client_body_temp;
    proxy_temp_path nginx_runtime/proxy_temp;
    fastcgi_temp_path nginx_runtime/fastcgi_temp;
    uwsgi_temp_path nginx_runtime/uwsgi_temp;
    scgi_temp_path nginx_runtime/scgi_temp;

    # Define upstream cluster of API Gateway instances (local host configuration)
    upstream gateway_cluster {
        # Least connection algorithm
        least_conn;

        # List of local SvelteKit API Gateway instances
        server 127.0.0.1:5173 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:5174 max_fails=3 fail_timeout=10s;
    }

    upstream article_service {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;
        server_name localhost;

        # Route article submit/list/detail API to article-service in native mode.
        location ~ ^/api/articles(/.*)?$ {
            proxy_pass http://article_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirect standard traffic to upstream API Gateway cluster
        location / {
            proxy_pass http://gateway_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable Server-Sent Events (SSE) stream support
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }
    }
}
